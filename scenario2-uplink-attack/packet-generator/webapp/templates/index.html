<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DEMOSAT · Uplink Command Builder</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="sat">🛰</span>
      <div>
        <div class="title">DEMOSAT&nbsp;//&nbsp;UPLINK COMMAND BUILDER</div>
        <div class="sub">CCSDS Telecommand over OOK · attacker console</div>
      </div>
    </div>
    <div class="linkinfo"><span>UPLINK 449.500 MHz</span><span class="dot"></span><span>TT&amp;C</span></div>
  </header>

  <main class="grid">
    <!-- LEFT: target intel + progress -->
    <section class="panel intel">
      <h2>TARGET INTEL</h2>
      <div id="dossier" class="dossier"></div>
      <div class="progresswrap">
        <div class="prow"><span>UPLINK ASSEMBLY</span><span id="progText">0 / 4</span></div>
        <div class="prail"><i id="progFill"></i></div>
        <div class="phint" id="progHint">Complete all 4 systems to arm the uplink.</div>
      </div>
    </section>

    <!-- CENTER: the puzzle steps -->
    <section class="panel steps">
      <div id="stepList"></div>
    </section>

    <!-- RIGHT: frame + signal + generate -->
    <section class="panel wire">
      <h2>LIVE CCSDS FRAME</h2>
      <div id="breakdown" class="breakdown"><div class="await">awaiting command…</div></div>
      <div class="metaline" id="frameMeta"></div>
      <h2>OOK UPLINK SIGNAL</h2>
      <canvas id="wave" width="600" height="90"></canvas>
      <button id="genBtn" class="genbtn locked" disabled>🔒 UPLINK LOCKED — 0/4 CONFIGURED</button>
      <div id="result" class="result hidden"></div>
    </section>
  </main>

  <div id="tooltip" class="tooltip hidden"></div>
  <script src="/static/app.js"></script>
</body>
</html>
