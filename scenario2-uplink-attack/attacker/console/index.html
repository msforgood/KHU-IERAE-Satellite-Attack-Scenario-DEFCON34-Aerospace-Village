<!doctype html>
<meta charset="utf-8">
<title>ATTACKER // Targeting Console — ③ 위성 조준</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<!--
  Attacker 3rd screen. Two real tools embedded side by side + the acquisition
  trigger. NO reimplementation — gpredict is streamed via noVNC, OpenVSA is its
  own web/Electron UI. Configure the sources with URL query params:

    index.html?gp=<gpredict-noVNC-url>&vsa=<OpenVSA-url>&gs=http://localhost:4540

  ACQUIRE → POST <gs>/api/acquire  → the physical antenna sweeps (③ 조준).
-->
<style>
  :root{--bg:#0c1118;--panel:#131a24;--ink:#e6edf3;--dim:#8497a8;--line:rgba(255,255,255,.1);
        --cyan:#35d0e0;--good:#4ec98a;--crit:#ff5c5c;--mono:ui-monospace,"SF Mono",Menlo,monospace}
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--ink);
            font:14px/1.5 system-ui,-apple-system,"Segoe UI",sans-serif}
  body{display:flex;flex-direction:column}
  header{display:flex;align-items:center;gap:16px;padding:10px 18px;border-bottom:1px solid var(--line);
         background:linear-gradient(180deg,#131a24,#0f151d)}
  header h1{font-size:15px;margin:0;font-weight:680;letter-spacing:.02em}
  header .step{font-family:var(--mono);font-size:11px;letter-spacing:.16em;color:var(--cyan);text-transform:uppercase}
  header .spacer{flex:1}
  button{font-family:var(--mono);font-size:12px;color:var(--ink);background:var(--panel);
         border:1px solid var(--line);border-radius:7px;padding:7px 13px;cursor:pointer;transition:.15s}
  button:hover{border-color:var(--cyan);color:var(--cyan)}
  button.lock{border-color:var(--good);color:var(--good)}
  button.lock.on{background:var(--good);color:#06120b}
  button.fire{border-color:var(--crit);color:var(--crit)}
  button.fire:hover{background:var(--crit);color:#120606}
  #status{font-family:var(--mono);font-size:12px;color:var(--dim);min-width:180px;text-align:right}
  #status b{color:var(--ink)}
  main{flex:1;display:grid;grid-template-columns:2fr 3fr;gap:1px;background:var(--line);min-height:0}
  section{display:flex;flex-direction:column;background:var(--bg);min-height:0}
  section .cap{font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;
               color:var(--dim);padding:8px 14px;border-bottom:1px solid var(--line)}
  section .cap b{color:var(--cyan)}
  iframe{flex:1;width:100%;border:0;background:#000}
  .empty{flex:1;display:grid;place-items:center;padding:24px;color:var(--dim);text-align:center}
  .empty code{font-family:var(--mono);color:var(--ink);background:var(--panel);padding:2px 6px;border-radius:4px}
  @media(max-width:820px){main{grid-template-columns:1fr;grid-template-rows:1fr 1fr}}
</style>

<header>
  <span class="step">③ 위성 조준</span>
  <h1>ATTACKER · Targeting Console — DEMOSAT</h1>
  <span class="spacer"></span>
  <button class="lock" id="lock">◎ ACQUIRE LOCK</button>
  <button class="fire" id="transmit">⚡ TRANSMIT</button>
  <button id="reset">RESET</button>
  <span id="status">idle</span>
</header>

<main>
  <section>
    <div class="cap">🛰️ gpredict — <b>SATELLITE TRACKING</b> (virtual TLE)</div>
    <div id="gpSlot" class="empty"></div>
  </section>
  <section>
    <div class="cap">📡 OpenVSA — <b>VSA UPLINK / ROTATOR</b></div>
    <div id="vsaSlot" class="empty"></div>
  </section>
</main>

<script>
  const q = new URLSearchParams(location.search);
  const GS  = (q.get("gs")  || "http://localhost:4540").replace(/\/$/, "");
  const GP  = q.get("gp")  || "";   // gpredict noVNC url
  const VSA = q.get("vsa") || "";   // OpenVSA UI url

  function embed(slot, src, hint) {
    const el = document.getElementById(slot);
    if (src) { el.outerHTML = `<iframe id="${slot}" src="${src}" allow="fullscreen"></iframe>`; }
    else     { el.innerHTML = hint; }
  }
  embed("gpSlot", GP,
    `실제 gpredict 화면을 여기 임베드하려면 <code>run-gpredict-web.sh</code>로 noVNC를 띄운 뒤<br>
     <code>?gp=http://localhost:6080/vnc.html?autoconnect=1&amp;resize=scale</code> 로 여세요.`);
  embed("vsaSlot", VSA,
    `OpenVSA UI 주소를 <code>?vsa=…</code>로 지정하세요.<br>기본은 별도 창(Electron)으로 실행됩니다.`);

  const lock = document.getElementById("lock");
  const statusEl = document.getElementById("status");
  let locked = false;

  async function post(path, body) {
    const r = await fetch(GS + path, { method: "POST",
      headers: { "content-type": "application/json" }, body: JSON.stringify(body || {}) });
    if (!r.ok) throw new Error(r.status);
  }
  function setStatus(t, cls) { statusEl.innerHTML = t; statusEl.style.color = cls || ""; }

  lock.onclick = async () => {
    try {
      locked = !locked;
      await post("/api/acquire", locked ? {} : { on: false });
      lock.classList.toggle("on", locked);
      lock.textContent = locked ? "◉ LOCKED — SWEEPING" : "◎ ACQUIRE LOCK";
      setStatus(locked ? "target <b>ACQUIRED</b> · 🛰️ antenna sweeping" : "lock released",
                locked ? "var(--good)" : "");
    } catch (e) { setStatus("GS 연결 실패 (" + e.message + ")", "var(--crit)"); locked = !locked; }
  };
  // ⚡ TRANSMIT — fire the uplink at the victim GS. OpenVSA's Electron decode/forward
  // isn't available in the browser, so we POST the attack command straight to the GS
  // API (/api/inject) — the same effect the forwarded uplink would have.
  //   adcs_torque · payload 0x03e7 (999 mNm) → tumbling → sun-track loss → ENERGY SUPPLY CRITICAL
  const ATTACK = { command: "adcs_torque", payload: ["0x03", "0xe7"] };
  document.getElementById("transmit").onclick = async () => {
    try {
      await post("/api/inject", ATTACK);
      setStatus("⚡ UPLINK TRANSMITTED · adcs_torque 999 mNm", "var(--crit)");
    } catch (e) { setStatus("GS 연결 실패 (" + e.message + ")", "var(--crit)"); }
  };

  document.getElementById("reset").onclick = async () => {
    try { await post("/api/reset"); locked = false; lock.classList.remove("on");
          lock.textContent = "◎ ACQUIRE LOCK"; setStatus("reset → nominal"); }
    catch (e) { setStatus("GS 연결 실패 (" + e.message + ")", "var(--crit)"); }
  };
</script>
