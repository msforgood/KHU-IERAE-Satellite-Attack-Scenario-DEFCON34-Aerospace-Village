<!doctype html>
<meta charset="utf-8" />
<title>ATTACKER // Targeting Console — ③ Satellite Targeting</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<!--
  Attacker 3rd screen. Two real tools embedded side by side. NO reimplementation
  — gpredict is streamed via noVNC, OpenVSA is its own web/Electron UI. Configure
  the sources with URL query params:

    index.html?gp=<gpredict-noVNC-url>&vsa=<OpenVSA-url>&gs=http://localhost:4540

  ⚡ TRANSMIT (in the OpenVSA caption bar) → POST <gs>/api/inject → adcs_torque 999.
-->
<style>
  :root {
    --bg: #0c1118;
    --panel: #131a24;
    --ink: #e6edf3;
    --dim: #8497a8;
    --line: rgba(255, 255, 255, 0.1);
    --cyan: #35d0e0;
    --good: #4ec98a;
    --crit: #ff5c5c;
    --mono: ui-monospace, "SF Mono", Menlo, monospace;
  }
  * {
    box-sizing: border-box;
  }
  html,
  body {
    margin: 0;
    height: 100%;
    background: var(--bg);
    color: var(--ink);
    font:
      14px/1.5 system-ui,
      -apple-system,
      "Segoe UI",
      sans-serif;
  }
  body {
    display: flex;
    flex-direction: column;
  }
  button {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--ink);
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 7px;
    padding: 6px 13px;
    cursor: pointer;
    transition: 0.15s;
  }
  button:hover {
    border-color: var(--cyan);
    color: var(--cyan);
  }
  button.fire {
    border-color: var(--crit);
    color: var(--crit);
  }
  button.fire:hover {
    background: var(--crit);
    color: #120606;
  }
  #status {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--dim);
    text-align: right;
  }
  #status b {
    color: var(--ink);
  }
  main {
    flex: 1;
    display: grid;
    grid-template-columns: 2fr 3fr;
    gap: 1px;
    background: var(--line);
    min-height: 0;
  }
  section {
    display: flex;
    flex-direction: column;
    background: var(--bg);
    min-height: 0;
    position: relative;
  }
  section .cap {
    font-family: var(--mono);
    font-size: 13px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--dim);
    padding: 8px 14px;
    border-bottom: 1px solid var(--line);
  }
  section .cap b {
    color: var(--cyan);
  }
  section .cap--row {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  section .cap--row .spacer {
    flex: 1;
  }
  section .cap--row button {
    letter-spacing: normal;
    text-transform: none;
  }
  section .cap .stepno {
    display: inline-block;
    background: var(--cyan);
    color: #04222a;
    font-weight: 700;
    padding: 1px 7px;
    border-radius: 5px;
    margin-right: 8px;
    letter-spacing: 0.08em;
  }
  /* STEP 2 gate: a transparent box over OpenVSA that swallows clicks until the
     gpredict aiming (STEP 1) is engaged. Removed once STEP 1 reports "engaged". */
  .lockbox {
    position: absolute;
    inset: 0;
    z-index: 15;
    cursor: not-allowed;
    background: transparent;
  }
  .lockbox.hidden {
    display: none;
  }
  #lockTip {
    position: fixed;
    z-index: 60;
    pointer-events: none;
    display: none;
    white-space: nowrap;
    background: rgba(20, 26, 34, 0.97);
    border: 1px solid var(--crit);
    color: var(--ink);
    font-family: var(--mono);
    font-size: 13px;
    padding: 8px 12px;
    border-radius: 8px;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
  }
  #lockTip.show {
    display: block;
  }
  iframe {
    flex: 1;
    width: 100%;
    border: 0;
    background: #000;
  }
  .empty {
    flex: 1;
    display: grid;
    place-items: center;
    padding: 24px;
    color: var(--dim);
    text-align: center;
  }
  .empty code {
    font-family: var(--mono);
    color: var(--ink);
    background: var(--panel);
    padding: 2px 6px;
    border-radius: 4px;
  }
  @media (max-width: 820px) {
    main {
      grid-template-columns: 1fr;
      grid-template-rows: 1fr 1fr;
    }
  }
  /* participant guide — anchored just under the gpredict panel caption */
  #guide {
    position: absolute;
    left: 12px;
    top: 42px;
    width: min(380px, calc(100% - 24px));
    max-height: calc(100% - 54px);
    overflow-y: auto;
    z-index: 20;
    background: rgba(15, 21, 29, 0.95);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 14px 16px;
    backdrop-filter: blur(6px);
    box-shadow: 0 10px 34px rgba(0, 0, 0, 0.55);
    display: none;
  }
  #guide.show {
    display: block;
  }
  #guide h3 {
    margin: 0 0 10px;
    font-size: 13px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--cyan);
    font-family: var(--mono);
  }
  #guide .row {
    display: flex;
    justify-content: space-between;
    gap: 10px;
    font-family: var(--mono);
    font-size: 13px;
    color: var(--dim);
    margin: 3px 0;
  }
  #guide .row b {
    color: var(--ink);
  }
  #guide .bar {
    height: 6px;
    border-radius: 4px;
    background: var(--panel);
    overflow: hidden;
    margin: 8px 0;
  }
  #guide .bar > i {
    display: block;
    height: 100%;
    width: 0;
    background: var(--cyan);
    transition: width 0.5s;
  }
  #guide .state {
    margin: 8px 0;
    font-weight: 640;
  }
  #guide .state .cd {
    font-family: var(--mono);
    font-size: 22px;
    font-weight: 720;
    color: var(--cyan);
    vertical-align: -2px;
  }
  #guide .state.wait {
    color: var(--dim);
  }
  #guide .state.ready {
    color: var(--good);
  }
  #guide .state.busy {
    color: var(--cyan);
  }
  #guide .state.done {
    color: var(--cyan);
  }
  #guide .state.err {
    color: var(--crit);
  }
  #guide .spin {
    display: inline-block;
    width: 11px;
    height: 11px;
    border: 2px solid var(--line);
    border-top-color: var(--cyan);
    border-radius: 50%;
    animation: gspin 0.7s linear infinite;
    vertical-align: -1px;
    margin-right: 6px;
  }
  @keyframes gspin {
    to {
      transform: rotate(360deg);
    }
  }
  #guide button.go {
    width: 100%;
    border-color: var(--good);
    color: var(--good);
    font-size: 13px;
    padding: 10px;
    margin-top: 2px;
  }
  #guide button.go:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    border-color: var(--line);
    color: var(--dim);
  }
  #guide ol {
    margin: 10px 0 0;
    padding-left: 18px;
    font-size: 13px;
    line-height: 1.8;
    color: var(--dim);
  }
  #guide ol li.active {
    color: var(--ink);
  }
  #guide ol li.ok {
    color: var(--good);
  }
  #guide ol li.ok::marker {
    content: "✓ ";
  }
  /* step-by-step aim: a compact progress checklist + a per-step lesson card so
     participants learn WHAT each uplink parameter is and WHY it's needed. */
  #guide .steps {
    list-style: none;
    margin: 6px 0 0;
    padding: 0;
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.7;
    color: var(--dim);
  }
  #guide .steps li::before {
    content: "○ ";
    color: var(--line);
  }
  #guide .steps li.active {
    color: var(--ink);
  }
  #guide .steps li.active::before {
    content: "▸ ";
    color: var(--cyan);
  }
  #guide .steps li.ok {
    color: var(--good);
  }
  #guide .steps li.ok::before {
    content: "✓ ";
    color: var(--good);
  }
  #guide .steps li b {
    color: var(--ink);
  }
  #guide .lesson {
    border: 1px solid var(--line);
    border-left: 3px solid var(--cyan);
    border-radius: 9px;
    padding: 10px 12px;
    margin: 10px 0 8px;
    background: rgba(53, 208, 224, 0.05);
  }
  #guide .lesson .ltitle {
    font-family: var(--mono);
    font-size: 13px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--cyan);
    margin-bottom: 5px;
  }
  #guide .lesson .lval {
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 700;
    color: var(--ink);
    margin-bottom: 8px;
  }
  #guide .lesson .lrow {
    font-size: 13px;
    line-height: 1.55;
    color: var(--dim);
    margin: 5px 0;
    font-weight: 400;
  }
  #guide .lesson .lrow b {
    color: var(--ink);
    font-weight: 600;
  }
  #guide .lesson .ltag {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--cyan);
    font-weight: 700;
    margin-right: 4px;
  }
  #guide button.next {
    width: 100%;
    border-color: var(--cyan);
    color: var(--cyan);
    font-size: 13px;
    padding: 10px;
    margin-top: 2px;
  }
  #guide button.next:hover {
    background: rgba(53, 208, 224, 0.12);
  }
  #guide button.next:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    border-color: var(--line);
    color: var(--dim);
    background: none;
  }
</style>

<main>
  <section>
    <div class="cap"><span class="stepno">STEP 1</span>🛰️ gpredict — <b>SATELLITE TRACKING</b> (virtual TLE)</div>
    <!-- participant guide: wait for the pass, then one button auto-operates gpredict -->
    <div id="guide">
      <h3>SATELLITE TARGETING</h3>
      <div class="state wait" id="gState">Waiting for the satellite to enter range…</div>
      <button class="go" id="gGo" disabled>⚡ ENGAGE</button>
    </div>
    <div id="gpSlot" class="empty"></div>
  </section>
  <section>
    <div class="cap cap--row">
      <span><span class="stepno">STEP 2</span>📡 <b>VIRTUAL ANTENNA UPLINK / ROTATOR</b></span>
      <span class="spacer"></span>
      <span id="status"></span>
    </div>
    <div id="vsaSlot" class="empty"></div>
    <!-- swallows all clicks on OpenVSA (incl. its TRANSMIT) until STEP 1 is engaged -->
    <div id="vsaLock" class="lockbox"></div>
  </section>
</main>
<div id="lockTip">❗ Complete Step 1 first</div>

<script>
  const q = new URLSearchParams(location.search);
  const GS = (q.get("gs") || "http://localhost:4540").replace(/\/$/, "");
  const GP = q.get("gp") || ""; // gpredict noVNC url
  const VSA = q.get("vsa") || ""; // OpenVSA UI url
  const CTRL = (q.get("ctrl") || "http://localhost:6079").replace(/\/$/, ""); // gpredict time-control

  function embed(slot, src, hint) {
    const el = document.getElementById(slot);
    if (src) {
      el.outerHTML = `<iframe id="${slot}" src="${src}" allow="fullscreen"></iframe>`;
    } else {
      el.innerHTML = hint;
    }
  }
  embed(
    "gpSlot",
    GP,
    `To embed the real gpredict screen here, start noVNC with <code>run-gpredict-web.sh</code>, then open<br>
     <code>?gp=http://localhost:6080/vnc.html?autoconnect=1&amp;resize=scale</code>.`,
  );
  embed(
    "vsaSlot",
    VSA,
    `Set the OpenVSA UI address with <code>?vsa=…</code>.<br>By default it runs in a separate window (Electron).`,
  );

  const statusEl = document.getElementById("status");

  // ── STEP 2 lock: transparent overlay blocks OpenVSA until STEP 1 (gpredict
  //    aiming) is engaged. Hover/click surfaces the "finish Step 1 first" tip. ──
  const vsaLock = document.getElementById("vsaLock");
  const lockTip = document.getElementById("lockTip");
  function showTip(e) {
    if (vsaLock.classList.contains("hidden")) return;
    lockTip.classList.add("show");
    const x = Math.min(e.clientX + 14, innerWidth - lockTip.offsetWidth - 8);
    lockTip.style.left = Math.max(8, x) + "px";
    lockTip.style.top = e.clientY + 16 + "px";
  }
  function hideTip() {
    lockTip.classList.remove("show");
  }
  vsaLock.addEventListener("mouseenter", showTip);
  vsaLock.addEventListener("mousemove", showTip);
  vsaLock.addEventListener("mouseleave", hideTip);
  vsaLock.addEventListener("click", showTip);
  function unlockStep2() {
    vsaLock.classList.add("hidden");
    hideTip();
  }

  async function post(path, body) {
    const r = await fetch(GS + path, {
      method: "POST",
      headers: { "content-type": "application/json" },
      body: JSON.stringify(body || {}),
    });
    if (!r.ok) throw new Error(r.status);
  }
  function setStatus(t, cls) {
    statusEl.innerHTML = t;
    statusEl.style.color = cls || "";
  }

  // ⚡ TRANSMIT — fired by the VSA's own uplink TRANSMIT button (it posts a
  // "vsa-transmit" message to this parent). We POST the attack straight to the GS
  // API (/api/inject) → adcs_torque 999 mNm → tumbling → sun-track loss + solar
  // panel motor runaway + dashboard alarm.
  const ATTACK = { command: "adcs_torque", payload: ["0x03", "0xe7"] };
  async function fireAttack() {
    try {
      await post("/api/inject", ATTACK);
      setStatus("⚡ UPLINK TRANSMITTED · adcs_torque 999 mNm", "var(--crit)");
      // notify the outer Command Builder that the uplink was fired, so a scenario's
      // next-phase entry (e.g. ④ drone spoof) can be revealed only AFTER transmit.
      try { window.parent.postMessage({ type: "attack-fired" }, "*"); } catch (e) { /* no parent */ }
    } catch (e) {
      setStatus("GS connection failed (" + e.message + ")", "var(--crit)");
    }
  }
  window.addEventListener("message", (e) => {
    if (e.data && e.data.type === "vsa-transmit") fireAttack();
  });

  // ── participant guide: poll gpredict's time-control server, gate the ENGAGE
  //    button on "satellite in range", then auto-operate gpredict on click. ────
  const guide = document.getElementById("guide");
  const gState = document.getElementById("gState");
  const gGo = document.getElementById("gGo");
  let engaged = false;

  // Countdown runs client-side from the moment phase 3 opens (this console loads),
  // so "wait N seconds then in range" is deterministic regardless of the gpredict
  // clock. We also flip early if the live elevation already reports in-range, and
  // LATCH once reached so a later re-arm never sends it back to "waiting".
  const T0 = Date.now();
  let leadSec = 30,
    reached = false;

  function setStateHTML(html, cls) {
    gState.innerHTML = html;
    gState.className = "state " + cls;
  }
  function render(s) {
    if (s && s.leadSec) leadSec = s.leadSec;
    const remaining = Math.max(0, leadSec - (Date.now() - T0) / 1000);
    const inNow = reached || remaining <= 0 || (s && s.inRange === true);
    if (inNow) {
      reached = true;
      setStateHTML("✅ In range — aim now", "ready");
      gGo.disabled = false;
    } else {
      gGo.disabled = true;
      setStateHTML(
        '<b class="cd">' + Math.ceil(remaining) + "</b>s until the satellite enters range…",
        "wait",
      );
    }
  }

  async function pollStatus() {
    let s = null;
    try {
      s = await (await fetch(CTRL + "/status")).json();
    } catch (e) {
      guide.classList.remove("show");
      return;
    } // gpredict/Docker down → hide
    guide.classList.add("show");
    if (engaged) return; // don't overwrite the "engaged" state
    render(s);
  }
  setInterval(pollStatus, 1000); // refresh in-range signal
  // tick the countdown every second even between polls, so the number never stalls
  setInterval(() => {
    if (guide.classList.contains("show") && !engaged) render(null);
  }, 1000);
  pollStatus();

  // ENGAGE: open STEP 2 and preset the VSA to the aimed uplink state via a
  // same-origin postMessage — target=DEMOSAT, uplink 433.5 MHz, and DEMOSAT's
  // ACTUAL az/el at the moment of the click (from the control server's live
  // look-angles). 206°/31° is only the VSA's initial pose; the ENGAGE aim uses
  // the real satellite angle, falling back to 206°/31° if the server is down.
  gGo.onclick = async () => {
    if (engaged) return;
    engaged = true;
    gGo.style.display = "none"; // hide the button entirely once clicked
    let az = 206, el = 31; // fallback = the initial pose
    try {
      const s = await (await fetch(CTRL + "/status")).json();
      if (Number.isFinite(s.azimDeg)) az = s.azimDeg;
      if (Number.isFinite(s.elevDeg)) el = s.elevDeg;
    } catch (e) { /* keep fallback */ }
    const azC = Math.max(0, Math.min(360, az));
    const elC = Math.max(0, Math.min(90, el));
    const fmt = (v) => String(parseFloat(v.toFixed(6))); // up to 6 decimals, no trailing zeros
    const sleep = (ms) => new Promise((r) => setTimeout(r, ms));
    const white = (t) => '<b style="color:var(--ink)">' + t + "</b>";
    const sendVSA = (obj) => {
      const f = document.getElementById("vsaSlot");
      try {
        if (f && f.contentWindow) f.contentWindow.postMessage({ type: "vsa-preset", ...obj }, "*");
      } catch (e) {
        /* ignore */
      }
    };
    // Each uplink parameter is applied ONE STEP AT A TIME. The target satellite
    // (step 0) auto-locks on ENGAGE; every parameter after it is gated behind a
    // button and carries a short lesson — what the value is, WHY it's needed, and
    // WHERE it's used — so participants learn the uplink chain, not just watch it.
    const steps = [
      {
        title: "Target Satellite",
        value: "DEMOSAT",
        apply: () => sendVSA({ targetSat: "DEMOSAT" }),
        why: "Picks <b>which spacecraft</b> the uplink is addressed to. gpredict has already locked DEMOSAT's TLE and is computing its live look-angles — every value below is derived from that lock.",
        use: "Binds the Virtual Antenna transmit chain to DEMOSAT's ephemeris, so the frequency and pointing angles that follow all refer to this one bird.",
      },
      {
        title: "Uplink Frequency",
        value: "433.5 MHz",
        apply: () => sendVSA({ uplinkFreq: 433.5 }),
        why: "The exact frequency DEMOSAT's <b>command receiver</b> is listening on. Transmit even slightly off and the satellite never demodulates the packet — the command is simply not heard.",
        use: "Tunes the transmitter's carrier. 433 MHz sits in the UHF telecommand band common to cubesats and amateur satellites.",
      },
      {
        title: "Antenna Type",
        value: "Dish (parabolic)",
        apply: () => sendVSA({ antennaType: "dish" }),
        why: "Antenna type sets <b>gain and beamwidth</b>. A dish is high-gain / narrow-beam — enough EIRP to close the uplink budget all the way to orbit, and it concentrates the energy on a single bearing.",
        use: "Switches the rotator model to a dish, which is why the two pointing angles below now matter — a wide whip would radiate everywhere and wouldn't need precise aim.",
      },
      {
        title: "Azimuth",
        value: fmt(azC) + "°",
        // applying the antenna angle → tell the GS the target is acquired so the
        // physical antenna motor moves (exact angle not needed; it just rotates).
        apply: () => {
          sendVSA({ azimuth: azC });
          post("/api/acquire", {}).catch(() => {});
        },
        why: "The horizontal compass bearing (0°=N, 90°=E, 180°=S). This is DEMOSAT's <b>current azimuth</b> from gpredict's look-angle — a narrow dish must sit on this exact bearing or the satellite falls outside the beam.",
        use: "Drives the ground-station rotator's pan motor to the satellite's bearing (fires <code>/api/acquire</code>, so the physical antenna actually turns).",
      },
      {
        title: "Elevation",
        value: fmt(elC) + "°",
        apply: () => sendVSA({ elevation: elC }),
        why: "The vertical angle above the horizon (0°=horizon, 90°=zenith). Must be positive: DEMOSAT is only reachable by <b>line of sight</b> while it is above the horizon — that's exactly the pass window gpredict counted down to.",
        use: "Tilts the rotator up to the satellite's elevation, completing the 2-axis aim. With both angles set, the dish beam is now locked on DEMOSAT.",
      },
    ];

    let idx = 0; // index of the step currently awaiting the user
    const doneVals = []; // captured value text for each completed step

    // progress checklist — done steps show ✓ + value, current shows ▸, rest ○
    function checklist() {
      return (
        '<ol class="steps">' +
        steps
          .map((s, i) => {
            const cls = i < idx ? "ok" : i === idx ? "active" : "";
            const val = i < idx ? " — <b>" + doneVals[i] + "</b>" : "";
            return '<li class="' + cls + '">' + s.title + val + "</li>";
          })
          .join("") +
        "</ol>"
      );
    }

    // render the lesson card for step i and wire its "continue" button
    function stepPanel(i) {
      const s = steps[i];
      const last = i === steps.length - 1;
      setStateHTML(
        checklist() +
          '<div class="lesson">' +
          '<div class="ltitle">Step ' + (i + 1) + " of " + steps.length + " · " + s.title + "</div>" +
          '<div class="lval">→ ' + s.value + "</div>" +
          '<div class="lrow"><span class="ltag">WHY</span>' + s.why + "</div>" +
          '<div class="lrow"><span class="ltag">USED FOR</span>' + s.use + "</div>" +
          "</div>" +
          '<button class="next" id="gNext">' +
          (last ? "Set elevation &amp; finish aim ✓" : "Set " + s.title.toLowerCase() + " &amp; continue →") +
          "</button>",
        "busy",
      );
      document.getElementById("gNext").onclick = () => advance(i);
    }

    // apply step i (with a short loading beat), record it, advance or finish
    async function advance(i) {
      const btn = document.getElementById("gNext");
      if (btn) btn.disabled = true;
      setStateHTML(
        checklist() +
          '<div class="lesson"><div class="lrow"><span class="spin"></span>Applying ' +
          steps[i].title.toLowerCase() +
          "…</div></div>",
        "busy",
      );
      await sleep(700);
      steps[i].apply();
      doneVals[i] = steps[i].value;
      idx = i + 1;
      if (idx < steps.length) stepPanel(idx);
      else finish();
    }

    function finish() {
      setStateHTML(
        checklist() +
          '<div class="lesson"><div class="ltitle">✅ Aim complete</div>' +
          '<div class="lrow">All 5 parameters are set — the dish is on DEMOSAT and the transmit chain is tuned. ' +
          'Now in <b style="color:var(--ink)">STEP 2</b>, ' +
          '<b style="color:var(--ink)">load the IQ file</b>, then hit ' +
          '<b style="color:var(--ink)">TRANSMIT</b> to uplink.</div></div>',
        "done",
      );
      unlockStep2(); // STEP 2 (OpenVSA) is now clickable
    }

    // STEP 0 (target satellite) locks automatically on ENGAGE; the rest are manual.
    setStateHTML(
      '🎯 Locking target…<br><span class="spin"></span>Setting target satellite…',
      "busy",
    );
    await sleep(900);
    steps[0].apply();
    doneVals[0] = steps[0].value;
    idx = 1;
    stepPanel(1);
  };
</script>
